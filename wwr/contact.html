<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Us | White Water Rafting</title>

    <meta name="description" content="Contact White Water Rafting for reservations, questions, trip information, and customer support.">
    <meta name="author" content="Solomon Michael">

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

<header>

    <img src="images/logo.jpeg" alt="White Water Rafting Logo">

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="trips.html">Trips</a>
        <a href="contact.html">Contact Us</a>
    </nav>

</header>

<main>

    <h1>Contact Us</h1>

    <section class="contact-info">

        <h2>Company Information</h2>

        <p><strong>Address:</strong> 39/40 Rangers Avenue, ID 83460</p>

        <p><strong>Phone:</strong> +1 (208) 555-1234</p>

        <p><strong>Email:</strong> info@whitewaterrafting.com</p>

        <iframe
title="White Water Rafting Location"
            src="https://www.google.com/maps?q=BYU-Idaho&output=embed"
            loading="lazy"
            allowfullscreen>
        </iframe>

    </section>
<section class="employees">

    <h2>Meet Our Team</h2>

    <figure>
        <img src="images/employee1.jpg" alt="John Smith - General Manager">
        <figcaption>John Smith - General Manager</figcaption>
    </figure>

    <figure>
        <img src="images/employee2.jpg" alt="Sarah Johnson - Trip Guide">
        <figcaption>Sarah Johnson - Trip Guide</figcaption>
    </figure>

    <figure>
        <img src="images/employee3.jpg" alt="David Brown - Customer Service Representative">
        <figcaption>David Brown - Customer Service Representative</figcaption>
    </figure>

</section>
<section class="contact-form">

    <h2>Send Us a Message</h2>

    <form action="#" method="post">

        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>

       <fieldset>

<legend>Purpose of Message</legend>

<label>
<input type="radio" name="purpose" value="general" checked>
General Inquiry
</label>

<label>
<input type="radio" name="purpose" value="reservation">
Reservation Question
</label>

<label>
<input type="radio" name="purpose" value="website">
Website Suggestion
</label>

</fieldset>

        <label for="message">Your Message</label>
        <textarea id="message" name="message" rows="6" required></textarea>

        <label>
            <input type="checkbox" name="newsletter">
            Please subscribe me to the monthly newsletter
        </label>

        <button type="submit">Send Message</button>

    </form>

</section>
</main>
<!-- Update -->
<footer>

    <p>&copy; 2026 White Water Rafting | Solomon Michael</p>

    <nav class="sociallinks">

        <a href="https://facebook.com">
            <img src="images/facebook.png" alt="Facebook">
        </a>

        <a href="https://twitter.com">
            <img src="images/twitter.png" alt="Twitter">
        </a>

        <a href="https://instagram.com">
            <img src="images/instagram.png" alt="Instagram">
        </a>

    </nav>

</footer>

</body>

</html>
